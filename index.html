<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>GET IT DONE — Task Manager</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link
      href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Space+Mono:ital,wght@0,400;0,700;1,400&display=swap"
      rel="stylesheet"
    />
    <style>
      /* ── Variables ─────────────────────────────────────────────────────────── */
      :root {
        --bg: #080808;
        --surface: #111111;
        --surface2: #1a1a1a;
        --border: #252525;
        --border2: #333;
        --accent: #f5e642;
        --accent-dim: #c9bb2a;
        --text: #f0f0f0;
        --muted: #666;
        --dim: #2e2e2e;
        --danger: #ff4040;
        --completed: #333;
      }

      /* ── Reset ─────────────────────────────────────────────────────────────── */
      *,
      *::before,
      *::after {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      html {
        scroll-behavior: smooth;
      }

      body {
        background: var(--bg);
        color: var(--text);
        font-family: "Space Mono", monospace;
        min-height: 100vh;
        overflow-x: hidden;
      }

      /* Grain texture overlay */
      body::after {
        content: "";
        position: fixed;
        inset: 0;
        background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='1'/%3E%3C/svg%3E");
        opacity: 0.025;
        pointer-events: none;
        z-index: 9999;
      }

      /* Ambient glow */
      body::before {
        content: "";
        position: fixed;
        top: -200px;
        left: -200px;
        width: 600px;
        height: 600px;
        background: radial-gradient(
          ellipse,
          rgba(245, 230, 66, 0.05) 0%,
          transparent 70%
        );
        pointer-events: none;
        z-index: 0;
      }

      /* ── Layout ─────────────────────────────────────────────────────────────── */
      .container {
        max-width: 740px;
        margin: 0 auto;
        padding: 64px 24px 120px;
        position: relative;
        z-index: 1;
      }

      /* ── Header ─────────────────────────────────────────────────────────────── */
      .header {
        margin-bottom: 48px;
      }

      .eyebrow {
        display: flex;
        align-items: center;
        gap: 10px;
        font-size: 11px;
        letter-spacing: 4px;
        text-transform: uppercase;
        color: var(--accent);
        margin-bottom: 10px;
      }

      .eyebrow::before {
        content: "";
        display: block;
        width: 28px;
        height: 2px;
        background: var(--accent);
        flex-shrink: 0;
      }

      h1 {
        font-family: "Bebas Neue", sans-serif;
        font-size: clamp(80px, 16vw, 128px);
        line-height: 0.88;
        letter-spacing: -1px;
        text-transform: uppercase;
        user-select: none;
      }

      h1 em {
        color: var(--accent);
        font-style: normal;
      }

      .tagline {
        margin-top: 20px;
        font-size: 11px;
        color: var(--muted);
        letter-spacing: 2px;
      }

      /* ── Stats ──────────────────────────────────────────────────────────────── */
      .stats {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        border: 1px solid var(--border);
        margin-bottom: 40px;
      }

      .stat {
        padding: 20px 24px;
        border-right: 1px solid var(--border);
      }

      .stat:last-child {
        border-right: none;
      }

      .stat-n {
        font-family: "Bebas Neue", sans-serif;
        font-size: 40px;
        line-height: 1;
        color: var(--accent);
        transition: color 0.2s;
      }

      .stat-l {
        font-size: 10px;
        letter-spacing: 3px;
        text-transform: uppercase;
        color: var(--muted);
        margin-top: 4px;
      }

      /* ── Progress ───────────────────────────────────────────────────────────── */
      .progress-wrap {
        margin-bottom: 36px;
      }

      .progress-head {
        display: flex;
        justify-content: space-between;
        font-size: 10px;
        letter-spacing: 2px;
        text-transform: uppercase;
        color: var(--muted);
        margin-bottom: 10px;
      }

      .progress-track {
        height: 2px;
        background: var(--dim);
        position: relative;
        overflow: hidden;
      }

      .progress-fill {
        position: absolute;
        inset: 0 auto 0 0;
        background: var(--accent);
        transition: width 0.5s cubic-bezier(0.4, 0, 0.2, 1);
        width: 0%;
      }

      /* ── Input Area ─────────────────────────────────────────────────────────── */
      .input-row {
        display: flex;
        border: 2px solid var(--border);
        margin-bottom: 12px;
        transition: border-color 0.2s;
      }

      .input-row:focus-within {
        border-color: var(--accent);
      }

      .task-input {
        flex: 1;
        background: transparent;
        border: none;
        outline: none;
        padding: 18px 20px;
        font-family: "Space Mono", monospace;
        font-size: 14px;
        color: var(--text);
        caret-color: var(--accent);
      }

      .task-input::placeholder {
        color: var(--dim);
      }

      .add-btn {
        background: var(--accent);
        border: none;
        padding: 0 28px;
        font-family: "Bebas Neue", sans-serif;
        font-size: 18px;
        letter-spacing: 2px;
        color: var(--bg);
        cursor: pointer;
        transition:
          background 0.15s,
          transform 0.1s;
        flex-shrink: 0;
        white-space: nowrap;
      }

      .add-btn:hover {
        background: #fff;
      }
      .add-btn:active {
        transform: scale(0.96);
      }

      .input-hint {
        font-size: 10px;
        color: var(--dim);
        letter-spacing: 1px;
        margin-bottom: 28px;
      }

      /* ── Filter Tabs ────────────────────────────────────────────────────────── */
      .filters {
        display: flex;
        border: 1px solid var(--border);
        margin-bottom: 20px;
      }

      .f-btn {
        flex: 1;
        background: transparent;
        border: none;
        border-right: 1px solid var(--border);
        padding: 12px 8px;
        font-family: "Space Mono", monospace;
        font-size: 10px;
        letter-spacing: 3px;
        text-transform: uppercase;
        color: var(--muted);
        cursor: pointer;
        transition: all 0.15s;
      }

      .f-btn:last-child {
        border-right: none;
      }

      .f-btn.active {
        background: var(--accent);
        color: var(--bg);
      }

      .f-btn:not(.active):hover {
        background: var(--surface2);
        color: var(--text);
      }

      /* ── Task List ──────────────────────────────────────────────────────────── */
      #task-list {
        display: flex;
        flex-direction: column;
        gap: 3px;
      }

      /* ── Empty State ────────────────────────────────────────────────────────── */
      .empty {
        padding: 64px 20px;
        text-align: center;
        border: 2px dashed var(--border);
      }

      .empty-icon {
        font-size: 36px;
        margin-bottom: 16px;
        opacity: 0.2;
      }

      .empty p {
        font-size: 11px;
        color: var(--muted);
        letter-spacing: 3px;
        text-transform: uppercase;
      }

      /* ── Task Item ──────────────────────────────────────────────────────────── */
      .task-item {
        display: flex;
        align-items: stretch;
        background: var(--surface);
        border: 1px solid var(--border);
        border-left: 3px solid transparent;
        transition:
          border-color 0.2s,
          border-left-color 0.2s,
          opacity 0.2s;
        animation: slideIn 0.22s ease forwards;
        overflow: hidden;
      }

      @keyframes slideIn {
        from {
          opacity: 0;
          transform: translateX(-10px);
        }
        to {
          opacity: 1;
          transform: translateX(0);
        }
      }

      @keyframes slideOut {
        from {
          opacity: 1;
          transform: translateX(0);
          max-height: 80px;
        }
        to {
          opacity: 0;
          transform: translateX(16px);
          max-height: 0;
          border-width: 0;
        }
      }

      .task-item:hover {
        border-color: var(--border2);
        border-left-color: var(--accent);
      }

      .task-item.done {
        border-left-color: var(--completed);
        opacity: 0.5;
      }

      .task-item.done:hover {
        border-left-color: var(--border2);
        opacity: 0.7;
      }

      .task-item.removing {
        animation: slideOut 0.22s ease forwards;
      }

      /* Checkbox */
      .cb-wrap {
        width: 56px;
        flex-shrink: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        border-right: 1px solid var(--border);
        cursor: pointer;
        transition: background 0.15s;
      }

      .cb-wrap:hover {
        background: var(--surface2);
      }

      .cb {
        width: 18px;
        height: 18px;
        border: 2px solid var(--border2);
        display: flex;
        align-items: center;
        justify-content: center;
        transition: all 0.15s;
        pointer-events: none;
      }

      .task-item.done .cb {
        background: var(--accent);
        border-color: var(--accent);
      }

      .cb-tick {
        display: none;
        color: var(--bg);
        font-size: 11px;
        font-weight: 900;
        line-height: 1;
      }

      .task-item.done .cb-tick {
        display: block;
      }

      /* Text */
      .task-body {
        flex: 1;
        padding: 16px 18px;
        min-width: 0;
      }

      .task-text {
        font-size: 14px;
        line-height: 1.5;
        color: var(--text);
        word-break: break-word;
        transition: all 0.2s;
      }

      .task-item.done .task-text {
        text-decoration: line-through;
        color: var(--muted);
      }

      .task-date {
        font-size: 10px;
        color: var(--dim);
        margin-top: 5px;
        letter-spacing: 1px;
      }

      /* Actions */
      .task-actions {
        display: flex;
        align-items: center;
        padding: 0 14px;
        opacity: 0;
        transition: opacity 0.15s;
        gap: 6px;
      }

      .task-item:hover .task-actions {
        opacity: 1;
      }

      .del-btn {
        width: 30px;
        height: 30px;
        background: transparent;
        border: 1px solid var(--border);
        cursor: pointer;
        color: var(--muted);
        font-size: 18px;
        line-height: 1;
        display: flex;
        align-items: center;
        justify-content: center;
        transition: all 0.15s;
        flex-shrink: 0;
      }

      .del-btn:hover {
        background: var(--danger);
        border-color: var(--danger);
        color: #fff;
      }

      /* ── Footer ─────────────────────────────────────────────────────────────── */
      .footer {
        margin-top: 44px;
        padding-top: 24px;
        border-top: 1px solid var(--border);
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        flex-wrap: wrap;
      }

      .footer-info {
        font-size: 11px;
        color: var(--muted);
        letter-spacing: 1px;
      }

      .clear-btn {
        background: transparent;
        border: 1px solid var(--border);
        padding: 9px 18px;
        font-family: "Space Mono", monospace;
        font-size: 10px;
        letter-spacing: 2px;
        text-transform: uppercase;
        color: var(--muted);
        cursor: pointer;
        transition: all 0.15s;
      }

      .clear-btn:hover:not(:disabled) {
        border-color: var(--danger);
        color: var(--danger);
      }

      .clear-btn:disabled {
        opacity: 0.25;
        cursor: not-allowed;
      }

      /* ── Toast ──────────────────────────────────────────────────────────────── */
      #toast {
        position: fixed;
        bottom: 32px;
        right: 32px;
        background: var(--surface);
        border: 1px solid var(--border2);
        border-left: 3px solid var(--accent);
        padding: 14px 22px;
        font-size: 12px;
        letter-spacing: 1px;
        color: var(--text);
        z-index: 9998;
        transform: translateY(60px);
        opacity: 0;
        pointer-events: none;
        transition:
          transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1),
          opacity 0.3s ease;
      }

      #toast.show {
        transform: translateY(0);
        opacity: 1;
      }

      /* ── Scrollbar ──────────────────────────────────────────────────────────── */
      ::-webkit-scrollbar {
        width: 4px;
      }
      ::-webkit-scrollbar-track {
        background: var(--bg);
      }
      ::-webkit-scrollbar-thumb {
        background: var(--border);
      }

      /* ── Responsive ─────────────────────────────────────────────────────────── */
      @media (max-width: 520px) {
        .container {
          padding: 40px 16px 80px;
        }

        .task-actions {
          opacity: 1;
        }

        .cb-wrap {
          width: 48px;
        }

        #toast {
          right: 16px;
          bottom: 16px;
          left: 16px;
        }
      }
    </style>
  </head>
  <body>
    <div class="container">
      <!-- Header -->
      <header class="header">
        <div class="eyebrow">Task Manager</div>
        <h1>Get It<br /><em>Done.</em></h1>
        <p class="tagline">Stay focused. Ship tasks. Zero excuses.</p>
      </header>

      <!-- Stats -->
      <div class="stats">
        <div class="stat">
          <div class="stat-n" id="s-total">0</div>
          <div class="stat-l">Total</div>
        </div>
        <div class="stat">
          <div class="stat-n" id="s-active">0</div>
          <div class="stat-l">Active</div>
        </div>
        <div class="stat">
          <div class="stat-n" id="s-done">0</div>
          <div class="stat-l">Done</div>
        </div>
      </div>

      <!-- Progress bar -->
      <div class="progress-wrap">
        <div class="progress-head">
          <span>Completion</span>
          <span id="pct-label">0%</span>
        </div>
        <div class="progress-track">
          <div class="progress-fill" id="progress-fill"></div>
        </div>
      </div>

      <!-- Input -->
      <div class="input-row">
        <input
          id="task-input"
          class="task-input"
          type="text"
          placeholder="What needs to get done..."
          maxlength="200"
          autocomplete="off"
          spellcheck="false"
        />
        <button class="add-btn" id="add-btn">+ Add</button>
      </div>
      <p class="input-hint">↵ Press Enter to add quickly</p>

      <!-- Filters -->
      <div class="filters">
        <button class="f-btn active" data-f="all">All</button>
        <button class="f-btn" data-f="active">Active</button>
        <button class="f-btn" data-f="done">Completed</button>
      </div>

      <!-- Task list -->
      <div id="task-list"></div>

      <!-- Footer -->
      <div class="footer">
        <span class="footer-info" id="footer-info">No tasks yet</span>
        <button class="clear-btn" id="clear-btn" disabled>
          Clear Completed
        </button>
      </div>
    </div>

    <!-- Toast -->
    <div id="toast"></div>

    <script>
      /* ── State ──────────────────────────────────────────────────────────────────── */
      const STORAGE_KEY = "gid_tasks_v1";
      let tasks = load();
      let filter = "all";

      /* ── Persistence ────────────────────────────────────────────────────────────── */
      function load() {
        try {
          return JSON.parse(localStorage.getItem(STORAGE_KEY)) || [];
        } catch {
          return [];
        }
      }

      function save() {
        localStorage.setItem(STORAGE_KEY, JSON.stringify(tasks));
      }

      /* ── Helpers ────────────────────────────────────────────────────────────────── */
      function uid() {
        return Date.now().toString(36) + Math.random().toString(36).slice(2, 7);
      }

      function fmt(ts) {
        return new Date(ts).toLocaleString("en-US", {
          month: "short",
          day: "numeric",
          hour: "2-digit",
          minute: "2-digit",
        });
      }

      function esc(s) {
        return s
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;")
          .replace(/"/g, "&quot;");
      }

      let toastTimer;
      function toast(msg) {
        const el = document.getElementById("toast");
        el.textContent = msg;
        el.classList.add("show");
        clearTimeout(toastTimer);
        toastTimer = setTimeout(() => el.classList.remove("show"), 2000);
      }

      /* ── Filtered view ──────────────────────────────────────────────────────────── */
      function visible() {
        if (filter === "active") return tasks.filter((t) => !t.done);
        if (filter === "done") return tasks.filter((t) => t.done);
        return tasks;
      }

      /* ── Render ─────────────────────────────────────────────────────────────────── */
      function render() {
        const list = document.getElementById("task-list");
        const shown = visible();
        const total = tasks.length;
        const done = tasks.filter((t) => t.done).length;
        const active = total - done;
        const pct = total ? Math.round((done / total) * 100) : 0;

        /* Stats */
        document.getElementById("s-total").textContent = total;
        document.getElementById("s-active").textContent = active;
        document.getElementById("s-done").textContent = done;

        /* Progress */
        document.getElementById("pct-label").textContent = pct + "%";
        document.getElementById("progress-fill").style.width = pct + "%";

        /* Footer */
        const clearBtn = document.getElementById("clear-btn");
        clearBtn.disabled = done === 0;
        document.getElementById("footer-info").textContent =
          total === 0
            ? "No tasks yet"
            : active === 0
              ? "All tasks complete 🎉"
              : active + " task" + (active !== 1 ? "s" : "") + " remaining";

        /* Empty state */
        if (shown.length === 0) {
          const msgs = {
            all: "Add your first task above",
            active: "Nothing left to do — nice work!",
            done: "No completed tasks yet",
          };
          list.innerHTML = `
      <div class="empty">
        <div class="empty-icon">◻</div>
        <p>${msgs[filter]}</p>
      </div>`;
          return;
        }

        /* Remove stale items */
        const shownIds = new Set(shown.map((t) => t.id));
        list.querySelectorAll(".task-item").forEach((el) => {
          if (!shownIds.has(el.dataset.id)) el.remove();
        });

        /* Remove stale empty state */
        list.querySelector(".empty")?.remove();

        /* Upsert items */
        shown.forEach((task) => {
          let el = list.querySelector(`[data-id="${task.id}"]`);

          if (!el) {
            el = document.createElement("div");
            el.className = "task-item" + (task.done ? " done" : "");
            el.dataset.id = task.id;
            el.innerHTML = `
        <div class="cb-wrap" onclick="toggle('${task.id}')">
          <div class="cb"><span class="cb-tick">✓</span></div>
        </div>
        <div class="task-body">
          <div class="task-text">${esc(task.text)}</div>
          <div class="task-date">${fmt(task.created)}</div>
        </div>
        <div class="task-actions">
          <button class="del-btn" onclick="remove('${task.id}')" title="Delete task">×</button>
        </div>`;
            list.appendChild(el);
          } else {
            /* Update completion class only */
            el.classList.toggle("done", task.done);
          }
        });

        /* Re-order DOM to match array order */
        shown.forEach((task) => {
          const el = list.querySelector(`[data-id="${task.id}"]`);
          if (el) list.appendChild(el);
        });
      }

      /* ── Actions ────────────────────────────────────────────────────────────────── */
      function addTask() {
        const input = document.getElementById("task-input");
        const text = input.value.trim();

        if (!text) {
          input.style.outline = "2px solid #ff4040";
          input.placeholder = "Type something first...";
          setTimeout(() => {
            input.style.outline = "";
            input.placeholder = "What needs to get done...";
          }, 700);
          return;
        }

        tasks.unshift({ id: uid(), text, done: false, created: Date.now() });
        save();
        input.value = "";
        input.focus();
        render();
        toast("Task added");
      }

      function toggle(id) {
        const t = tasks.find((t) => t.id === id);
        if (!t) return;
        t.done = !t.done;
        save();
        render();
        toast(t.done ? "Marked complete ✓" : "Marked active");
      }

      function remove(id) {
        const el = document.querySelector(`[data-id="${id}"]`);
        if (el) {
          el.classList.add("removing");
          setTimeout(() => {
            tasks = tasks.filter((t) => t.id !== id);
            save();
            render();
          }, 220);
        }
        toast("Task removed");
      }

      function clearDone() {
        const count = tasks.filter((t) => t.done).length;
        tasks = tasks.filter((t) => !t.done);
        save();
        render();
        toast(
          count + " completed task" + (count !== 1 ? "s" : "") + " cleared",
        );
      }

      /* ── Event Listeners ────────────────────────────────────────────────────────── */
      document.getElementById("add-btn").addEventListener("click", addTask);

      document.getElementById("task-input").addEventListener("keydown", (e) => {
        if (e.key === "Enter") addTask();
      });

      document.getElementById("clear-btn").addEventListener("click", clearDone);

      document.querySelectorAll(".f-btn").forEach((btn) => {
        btn.addEventListener("click", () => {
          filter = btn.dataset.f;
          document
            .querySelectorAll(".f-btn")
            .forEach((b) => b.classList.remove("active"));
          btn.classList.add("active");
          document.getElementById("task-list").innerHTML = "";
          render();
        });
      });

      /* ── Init ───────────────────────────────────────────────────────────────────── */
      render();
    </script>
  </body>
</html>
